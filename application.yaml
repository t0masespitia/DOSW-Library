spring:
  application:
    name: DOSW-Library

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb+srv://tomasespitiaq_db_user:Dosw2024@cluster0.caixds2.mongodb.net/?retryWrites=true&w=majority&appName=Cluster0}
      database: ${SPRING_DATA_MONGODB_DATABASE:library_db}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui/index.html
    enabled: true

server:
  port: ${PORT:8443}
  ssl:
    enabled: ${SSL_ENABLED:true}
    key-store: classpath:keystore.p12
    key-store-password: dosw123
    key-store-type: PKCS12
    key-alias: dosw-library

logging:
  level:
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: relational
  datasource:
    url: jdbc:postgresql://localhost:5432/library_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: mongo
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration